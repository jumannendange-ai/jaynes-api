<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AZAM CHANNELS PRO</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080810;
  --surface: #0f0f1a;
  --card: #131320;
  --accent: #ff6b35;
  --accent2: #00d4ff;
  --text: #fff;
  --muted: #8888aa;
  --border: rgba(255,107,53,0.2);
  --glow: 0 0 20px rgba(255,107,53,0.3);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-top: 120px;
  padding-bottom: 80px;
}

/* TOP BAR */
.topbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  background: rgba(8,8,16,0.95);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 10px 16px;
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}

.back-btn {
  background: rgba(255,107,53,0.15);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--accent);
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  text-decoration: none;
  transition: all 0.3s;
}

.back-btn:hover {
  background: rgba(255,107,53,0.3);
  transform: translateX(-2px);
}

.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 24px;
  letter-spacing: 3px;
  color: var(--accent);
}

.live-badge {
  background: var(--accent);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 20px;
  letter-spacing: 1px;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%,100% { opacity:1; }
  50% { opacity:0.6; }
}

.search-bar {
  display: flex;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  transition: all 0.3s;
}

.search-bar:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(255,107,53,0.15);
}

.search-bar input {
  flex: 1;
  padding: 10px 14px;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text);
  font-size: 13px;
  font-family: 'Outfit', sans-serif;
}

.search-bar input::placeholder { color: var(--muted); }

.search-bar button {
  padding: 0 14px;
  background: var(--accent);
  border: none;
  color: #fff;
  font-weight: 700;
  font-size: 13px;
  cursor: pointer;
  transition: background 0.2s;
}

.search-bar button:hover { background: #e55c22; }

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  padding: 12px;
}

/* CATEGORY HEADING */
.cat-heading {
  grid-column: 1 / -1;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 18px;
  letter-spacing: 2px;
  color: var(--accent);
  padding: 10px 4px 4px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid var(--border);
}

.cat-heading::before {
  content: '';
  width: 4px;
  height: 18px;
  background: var(--accent);
  border-radius: 2px;
}

/* CARD */
.card {
  background: var(--card);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 14px;
  overflow: hidden;
  cursor: pointer;
  position: relative;
  transition: all 0.3s;
}

.card:hover {
  border-color: var(--accent);
  box-shadow: var(--glow);
  transform: translateY(-3px);
}

.card img {
  width: 100%;
  height: 160px;
  object-fit: cover;
  display: block;
  transition: transform 0.4s;
}

.card:hover img { transform: scale(1.05); }

.card-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 55%);
}

.card-title {
  position: absolute;
  bottom: 0;
  left: 0; right: 0;
  padding: 10px;
  font-size: 13px;
  font-weight: 700;
  text-align: center;
}

.live-tag {
  position: absolute;
  top: 8px;
  left: 8px;
  background: #e50914;
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 6px;
  letter-spacing: 0.5px;
}

.play-icon {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 40px;
  height: 40px;
  background: rgba(0,0,0,0.6);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.3s;
}

.card:hover .play-icon { opacity: 1; }

.play-icon i { color: #fff; font-size: 16px; margin-left: 3px; }

/* STATUS */
#status {
  grid-column: 1 / -1;
  text-align: center;
  padding: 30px 0;
  color: var(--muted);
}

.spinner {
  width: 40px;
  height: 40px;
  border: 3px solid rgba(255,107,53,0.15);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 12px;
}

@keyframes spin { to { transform: rotate(360deg); } }

.error-card {
  grid-column: 1/-1;
  padding: 24px;
  background: rgba(255,68,68,0.1);
  border: 1px solid rgba(255,68,68,0.2);
  border-radius: 14px;
  text-align: center;
  color: #ff6688;
}

.error-card button {
  margin-top: 12px;
  padding: 9px 20px;
  background: var(--accent);
  border: none;
  border-radius: 8px;
  color: #fff;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Outfit', sans-serif;
  transition: all 0.3s;
}

/* BOTTOM NAV */
.bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 68px;
  background: rgba(8,8,16,0.96);
  backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-around;
  align-items: center;
  z-index: 1000;
}

.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  cursor: pointer;
  padding: 6px 16px;
  border-radius: 12px;
  transition: all 0.3s;
  text-decoration: none;
}

.nav-item i { font-size: 20px; color: var(--muted); transition: all 0.3s; }
.nav-item span { font-size: 10px; color: var(--muted); font-weight: 600; transition: all 0.3s; }
.nav-item.active i, .nav-item:hover i { color: var(--accent); }
.nav-item.active span, .nav-item:hover span { color: var(--accent); }
.nav-item.active { background: rgba(255,107,53,0.08); }

@media (min-width: 600px) {
  .grid { grid-template-columns: repeat(3, 1fr); }
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="brand">
    <a href="index.html" class="back-btn"><i class="fa fa-arrow-left"></i></a>
    <div class="logo">AZAM CHANNELS</div>
    <div class="live-badge">LIVE</div>
  </div>
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Tafuta channels za Azam...">
    <button id="searchBtn"><i class="fa fa-search"></i></button>
  </div>
</div>

<!-- GRID -->
<div class="grid" id="grid">
  <div id="status" style="grid-column:1/-1;">
    <div class="spinner"></div>
    Inapakia channels za Azam...
  </div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <a href="index.html" class="nav-item">
    <i class="fa fa-home"></i><span>Nyumbani</span>
  </a>
  <a href="live.php" class="nav-item">
    <i class="fa fa-circle-play"></i><span>Mechi</span>
  </a>
  <a href="face.html" class="nav-item active">
    <i class="fa fa-satellite-dish"></i><span>Azam</span>
  </a>
  <div class="nav-item" onclick="alert('Inakuja!')">
    <i class="fa fa-user"></i><span>Akaunti</span>
  </div>
</div>

<script>
const grid = document.getElementById('grid');
const searchInput = document.getElementById('searchInput');
const searchBtn = document.getElementById('searchBtn');
let allChannels = [];
let loadedCount = 0;
const batchSize = 20;

function showStatus(html) {
  document.getElementById('status').innerHTML = html;
}

function showError(msg) {
  grid.innerHTML = `
    <div class="error-card" style="grid-column:1/-1">
      <i class="fa fa-wifi" style="font-size:28px;margin-bottom:10px;display:block"></i>
      ${msg}
      <br>
      <button onclick="loadChannels()">Jaribu Tena</button>
    </div>`;
}

async function loadChannels(query='') {
  grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:30px;">
    <div class="spinner"></div><div style="margin-top:10px;color:#8888aa;">Inapakia channels...</div>
  </div>`;

  try {
    let url = 'azam.php';
    if (query) url += '?q=' + encodeURIComponent(query);
    const res = await fetch(url);
    const data = await res.json();

    if (!data.success || !data.channels.length) {
      showError('Hakuna channels zinazopatikana');
      return;
    }

    allChannels = data.channels;
    loadedCount = 0;
    grid.innerHTML = '';
    loadMore();
  } catch(e) {
    showError('Hakuna mtandao. Angalia connection yako.');
  }
}

function loadMore() {
  const batch = allChannels.slice(loadedCount, loadedCount + batchSize);
  batch.forEach(ch => {
    // Category heading
    if (!document.getElementById('cat-' + ch.category)) {
      const h = document.createElement('div');
      h.className = 'cat-heading';
      h.id = 'cat-' + ch.category;
      h.textContent = ch.category;
      grid.appendChild(h);
    }

    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <img src="${ch.image || ''}" alt="${ch.name}" loading="lazy"
           onerror="this.src='https://via.placeholder.com/300x160/131320/ff6b35?text=📺'">
      <div class="card-overlay"></div>
      <div class="live-tag">● LIVE</div>
      <div class="play-icon"><i class="fa fa-play"></i></div>
      <div class="card-title">${ch.name}</div>`;

    card.onclick = () => {
      const params = new URLSearchParams();
      params.set('url', ch.url);
      if (ch.key) params.set('key', ch.key);
      params.set('name', ch.name);
      window.location.href = 'player.php?' + params.toString();
    };
    grid.appendChild(card);
  });
  loadedCount += batch.length;
}

// Infinite scroll
window.addEventListener('scroll', () => {
  if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 300) {
    if (loadedCount < allChannels.length) loadMore();
  }
});

// Search
async function handleSearch() {
  const q = searchInput.value.trim();
  await loadChannels(q);
}

searchBtn.addEventListener('click', handleSearch);
searchInput.addEventListener('keypress', e => { if(e.key==='Enter') handleSearch(); });

loadChannels();
</script>
</body>
</html>
